<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vse najboljše Staš!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Press Start 2P", monospace;
        background: #0b0033;
        cursor: pointer;
        user-select: none;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }

      /* Centered birthday content */
      .birthday-container {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      /* Big 8 */
      .big-number {
        font-size: clamp(6rem, 25vw, 14rem);
        font-weight: bold;
        color: #ffd700;
        text-shadow:
          0 0 40px rgba(255, 215, 0, 0.8),
          0 0 80px rgba(255, 215, 0, 0.4),
          6px 6px 0 #b8860b,
          -3px -3px 0 #b8860b,
          3px -3px 0 #b8860b,
          -3px 3px 0 #b8860b;
        animation:
          number-float 3s ease-in-out infinite,
          number-glow 2s ease-in-out infinite alternate;
        position: relative;
      }

      @keyframes number-float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-15px) scale(1.05);
        }
      }

      @keyframes number-glow {
        0% {
          text-shadow:
            0 0 40px rgba(255, 215, 0, 0.8),
            0 0 80px rgba(255, 215, 0, 0.4),
            6px 6px 0 #b8860b,
            -3px -3px 0 #b8860b,
            3px -3px 0 #b8860b,
            -3px 3px 0 #b8860b;
        }
        100% {
          text-shadow:
            0 0 60px rgba(255, 215, 0, 1),
            0 0 120px rgba(255, 215, 0, 0.6),
            0 0 200px rgba(255, 165, 0, 0.3),
            6px 6px 0 #b8860b,
            -3px -3px 0 #b8860b,
            3px -3px 0 #b8860b,
            -3px 3px 0 #b8860b;
        }
      }

      /* Rocket row above the 8 */
      .rocket-row {
        display: flex;
        gap: clamp(6px, 2vw, 16px);
        margin-bottom: 15px;
        z-index: 11;
      }

      .mini-rocket {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: rocket-fly 1.8s ease-in-out infinite;
      }

      .mini-rocket:nth-child(1) {
        animation-delay: 0s;
      }
      .mini-rocket:nth-child(2) {
        animation-delay: 0.15s;
      }
      .mini-rocket:nth-child(3) {
        animation-delay: 0.3s;
      }
      .mini-rocket:nth-child(4) {
        animation-delay: 0.45s;
      }
      .mini-rocket:nth-child(5) {
        animation-delay: 0.6s;
      }
      .mini-rocket:nth-child(6) {
        animation-delay: 0.75s;
      }
      .mini-rocket:nth-child(7) {
        animation-delay: 0.9s;
      }
      .mini-rocket:nth-child(8) {
        animation-delay: 1.05s;
      }

      .rocket-nose {
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-bottom: 12px solid var(--nose-color, #ff3333);
      }

      .rocket-body {
        width: 14px;
        height: 28px;
        background: linear-gradient(90deg, #eee 0%, #ccc 50%, #aaa 100%);
        position: relative;
      }

      .rocket-window {
        width: 8px;
        height: 8px;
        background: #4aedd9;
        border-radius: 50%;
        position: absolute;
        top: 6px;
        left: 3px;
        box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.6);
      }

      .rocket-fin-l,
      .rocket-fin-r {
        position: absolute;
        bottom: 0;
        width: 0;
        height: 0;
        border-top: 8px solid transparent;
      }

      .rocket-fin-l {
        left: -6px;
        border-right: 7px solid var(--nose-color, #ff3333);
        border-bottom: 5px solid var(--nose-color, #ff3333);
      }

      .rocket-fin-r {
        right: -6px;
        border-left: 7px solid var(--nose-color, #ff3333);
        border-bottom: 5px solid var(--nose-color, #ff3333);
      }

      .rocket-exhaust {
        width: 10px;
        height: 18px;
        background: linear-gradient(
          180deg,
          #ffd700 0%,
          #ff6600 50%,
          #ff3300 90%,
          transparent 100%
        );
        clip-path: polygon(
          15% 0%,
          85% 0%,
          100% 40%,
          70% 70%,
          50% 100%,
          30% 70%,
          0% 40%
        );
        animation: exhaust-flicker 0.15s ease-in-out infinite alternate;
        filter: blur(0.5px);
        box-shadow: 0 5px 15px rgba(255, 102, 0, 0.6);
      }

      @keyframes rocket-fly {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-18px);
        }
      }

      @keyframes exhaust-flicker {
        0% {
          transform: scaleY(1) scaleX(1);
          opacity: 1;
        }
        100% {
          transform: scaleY(1.3) scaleX(0.85);
          opacity: 0.8;
        }
      }

      /* Title text */
      .birthday-title {
        font-size: clamp(1rem, 4vw, 2.5rem);
        color: #ffffff;
        text-shadow:
          4px 4px 0 #1a1a1a,
          -2px -2px 0 #1a1a1a,
          2px -2px 0 #1a1a1a,
          -2px 2px 0 #1a1a1a;
        text-align: center;
        margin-top: 20px;
        line-height: 1.8;
        animation: title-appear 1.5s ease-out forwards;
      }

      .birthday-title .name {
        color: #ffd700;
        text-shadow:
          4px 4px 0 #1a1a1a,
          -2px -2px 0 #1a1a1a,
          2px -2px 0 #1a1a1a,
          -2px 2px 0 #1a1a1a,
          0 0 30px rgba(255, 215, 0, 0.6);
      }

      .birthday-title .from {
        font-size: clamp(0.5rem, 2vw, 1rem);
        color: rgba(255, 255, 255, 0.8);
        text-shadow:
          2px 2px 0 #1a1a1a,
          -1px -1px 0 #1a1a1a,
          1px -1px 0 #1a1a1a,
          -1px 1px 0 #1a1a1a;
      }

      @keyframes title-appear {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Click prompt */
      .click-prompt {
        margin-top: 40px;
        font-size: clamp(0.45rem, 1.5vw, 0.75rem);
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 1px 1px 0 #000;
        animation: blink-prompt 2s ease-in-out infinite;
        letter-spacing: 2px;
      }

      @keyframes blink-prompt {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      /* Transition overlay */
      .transition-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #ffd700;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      .transition-overlay.active {
        opacity: 1;
      }

      /* Balloon styles */
      .balloon {
        position: fixed;
        width: 50px;
        height: 62px;
        border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
        z-index: 5;
        animation: balloon-rise linear forwards;
        filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.3));
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 30px;
        background: rgba(255, 255, 255, 0.4);
      }

      .balloon::before {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 6px;
        background: inherit;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        filter: brightness(0.8);
      }

      @keyframes balloon-rise {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-150vh) rotate(15deg);
          opacity: 0;
        }
      }

      /* Presents */
      .present {
        position: fixed;
        z-index: 3;
        animation: present-bounce 2s ease-in-out infinite;
      }

      .present-box {
        width: 40px;
        height: 35px;
        border-radius: 3px;
        position: relative;
      }

      .present-ribbon-v {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
      }

      .present-ribbon-h {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.7);
      }

      .present-lid {
        position: absolute;
        top: -8px;
        left: -3px;
        right: -3px;
        height: 10px;
        border-radius: 2px;
        filter: brightness(0.9);
      }

      .present-bow {
        position: absolute;
        top: -16px;
        left: 50%;
        transform: translateX(-50%);
        width: 16px;
        height: 10px;
      }

      .present-bow::before,
      .present-bow::after {
        content: "";
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.7);
        top: 0;
      }

      .present-bow::before {
        left: -2px;
      }
      .present-bow::after {
        right: -2px;
      }

      @keyframes present-bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="fireworks"></canvas>

    <div class="birthday-container">
      <div class="rocket-row">
        <div class="mini-rocket" style="--nose-color: #ff3333">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #ff6600">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #ffd700">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>

        </div>
        <div class="mini-rocket" style="--nose-color: #7dbb4c">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #4aedd9">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #a0a0ff">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #ff6b9d">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
        <div class="mini-rocket" style="--nose-color: #ff3333">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
          </div>
          <div class="rocket-exhaust"></div>
        </div>
      </div>
      <div class="big-number">8</div>
      <div class="birthday-title">
        Vse najboljše<br />
        <span class="name">STAŠ!!</span><br />
        <span class="from">Rachel in Sebastjan</span>
      </div>
      <div class="click-prompt">KLIKNI ZA IGRE</div>
    </div>

    <div class="transition-overlay" id="overlay"></div>

    <script>
      // Fireworks canvas
      const canvas = document.getElementById("fireworks");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      const particles = [];
      const fireworks = [];
      const colors = [
        "#FF3333",
        "#FFD700",
        "#4AEDD9",
        "#FF6B9D",
        "#7DBB4C",
        "#A0A0FF",
        "#FF6600",
        "#FFFFFF",
      ];

      class Particle {
        constructor(x, y, color, speed, angle, life, size) {
          this.x = x;
          this.y = y;
          this.color = color;
          this.speed = speed;
          this.angle = angle;
          this.life = life;
          this.maxLife = life;
          this.size = size || 3;
          this.gravity = 0.03;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.trail = [];
        }

        update() {
          this.trail.push({
            x: this.x,
            y: this.y,
            life: this.life / this.maxLife,
          });
          if (this.trail.length > 6) this.trail.shift();

          this.vy += this.gravity;
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.99;
          this.vy *= 0.99;
          this.life--;
        }

        draw() {
          // Trail
          for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const alpha =
              (i / this.trail.length) * (this.life / this.maxLife) * 0.5;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle =
              this.color +
              Math.floor(alpha * 255)
                .toString(16)
                .padStart(2, "0");
            ctx.fill();
          }

          // Main particle
          const alpha = this.life / this.maxLife;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = alpha;
          ctx.fill();
          ctx.globalAlpha = 1;

          // Glow
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2 * alpha, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = alpha * 0.2;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      class Firework {
        constructor(x, targetY) {
          this.x = x;
          this.y = canvas.height;
          this.targetY = targetY;
          this.speed = 4 + Math.random() * 3;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.trail = [];
          this.exploded = false;
        }

        update() {
          if (!this.exploded) {
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 10) this.trail.shift();

            this.y -= this.speed;
            this.x += Math.sin(this.y * 0.02) * 0.5;

            if (this.y <= this.targetY) {
              this.explode();
              this.exploded = true;
            }
          }
        }

        explode() {
          const numParticles = 60 + Math.floor(Math.random() * 40);
          const baseColor = this.color;
          const secondColor = colors[Math.floor(Math.random() * colors.length)];

          for (let i = 0; i < numParticles; i++) {
            const angle =
              (Math.PI * 2 * i) / numParticles + (Math.random() - 0.5) * 0.3;
            const speed = 1.5 + Math.random() * 3.5;
            const color = Math.random() > 0.3 ? baseColor : secondColor;
            const life = 60 + Math.floor(Math.random() * 40);
            const size = 2 + Math.random() * 2;
            particles.push(
              new Particle(this.x, this.y, color, speed, angle, life, size),
            );
          }

          // Inner ring
          for (let i = 0; i < 15; i++) {
            const angle = (Math.PI * 2 * i) / 15;
            const speed = 0.5 + Math.random() * 1;
            particles.push(
              new Particle(this.x, this.y, "#FFFFFF", speed, angle, 30, 1.5),
            );
          }
        }

        draw() {
          if (!this.exploded) {
            for (let i = 0; i < this.trail.length; i++) {
              const t = this.trail[i];
              const alpha = i / this.trail.length;
              ctx.beginPath();
              ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
              ctx.fillStyle = this.color;
              ctx.globalAlpha = alpha * 0.6;
              ctx.fill();
              ctx.globalAlpha = 1;
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.3;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      }

      // Spawn balloons
      function spawnBalloon() {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        const balloonColors = [
          "#FF3333",
          "#FFD700",
          "#4AEDD9",
          "#FF6B9D",
          "#7DBB4C",
          "#A0A0FF",
          "#FF6600",
        ];
        const color =
          balloonColors[Math.floor(Math.random() * balloonColors.length)];
        balloon.style.background = `radial-gradient(circle at 35% 30%, ${color}dd, ${color})`;
        balloon.style.left = Math.random() * (window.innerWidth - 50) + "px";
        balloon.style.animationDuration = 6 + Math.random() * 6 + "s";
        balloon.style.animationDelay = Math.random() * 2 + "s";
        document.body.appendChild(balloon);
        setTimeout(() => balloon.remove(), 14000);
      }

      // Spawn presents at edges
      function spawnPresents() {
        const presentColors = [
          "#FF3333",
          "#4AEDD9",
          "#FFD700",
          "#FF6B9D",
          "#7DBB4C",
        ];
        const positions = [
          { left: "5%", bottom: "8%" },
          { left: "12%", bottom: "5%" },
          { right: "5%", bottom: "6%" },
          { right: "13%", bottom: "9%" },
          { left: "8%", bottom: "12%" },
          { right: "9%", bottom: "13%" },
        ];

        positions.forEach((pos, i) => {
          const present = document.createElement("div");
          present.className = "present";
          const color = presentColors[i % presentColors.length];
          Object.assign(present.style, pos);
          present.style.animationDelay = i * 0.3 + "s";
          present.innerHTML = `
                    <div class="present-bow"></div>
                    <div class="present-lid" style="background:${color}"></div>
                    <div class="present-box" style="background:${color}">
                        <div class="present-ribbon-v"></div>
                        <div class="present-ribbon-h"></div>
                    </div>
                `;
          document.body.appendChild(present);
        });
      }

      // Auto-launch fireworks
      let fireworkTimer = 0;
      function launchFirework() {
        const x = canvas.width * 0.15 + Math.random() * canvas.width * 0.7;
        const targetY =
          canvas.height * 0.1 + Math.random() * canvas.height * 0.35;
        fireworks.push(new Firework(x, targetY));
      }

      // Confetti on click
      function burstConfetti(x, y) {
        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 4;
          const color = colors[Math.floor(Math.random() * colors.length)];
          particles.push(
            new Particle(x, y, color, speed, angle, 50 + Math.random() * 30, 3),
          );
        }
      }

      // Animation loop
      function animate() {
        ctx.fillStyle = "rgba(11, 0, 51, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Auto fireworks
        fireworkTimer++;
        if (fireworkTimer % 60 === 0) {
          launchFirework();
          if (Math.random() > 0.5) {
            setTimeout(launchFirework, 200 + Math.random() * 400);
          }
        }

        // Update & draw fireworks
        for (let i = fireworks.length - 1; i >= 0; i--) {
          fireworks[i].update();
          fireworks[i].draw();
          if (fireworks[i].exploded) fireworks.splice(i, 1);
        }

        // Update & draw particles
        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(animate);
      }

      // Click handler — confetti burst + navigate after a few clicks
      let clickCount = 0;
      document.body.addEventListener("click", (e) => {
        burstConfetti(e.clientX, e.clientY);
        launchFirework();
        launchFirework();
        clickCount++;

        if (clickCount >= 3) {
          const overlay = document.getElementById("overlay");
          overlay.classList.add("active");
          setTimeout(() => {
            window.location.href = "games.html";
          }, 500);
        }
      });

      // Balloon spawner
      spawnPresents();
      spawnBalloon();
      setInterval(spawnBalloon, 2500);

      // Initial fireworks burst
      setTimeout(launchFirework, 300);
